[web]
web01 ansible_host=IP_DE_LA_VM_WEB ansible_user=admincloud

[monitoring]
monitoring01 ansible_host=IP_DE_LA_VM_MONITORING ansible_user=admincloud

[all:vars]
ansible_ssh_private_key_file=~/.ssh/tp_azure_ed25519
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
