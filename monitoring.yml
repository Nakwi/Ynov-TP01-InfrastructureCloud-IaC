#cloud-config

hostname: monitoring
fqdn: monitoring.local

package_update: true
package_upgrade: true

users:
  - name: admincloud
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_public_key}

packages:
  - ca-certificates
  - curl
  - wget
  - git
  - htop
  - unzip
  - python3
  - python3-apt
  - python3-pip

write_files:
  - path: /opt/cloud-init-monitoring-info.txt
    permissions: "0644"
    owner: root:root
    content: |
      VM monitoring initialisée par cloud-init.
      Docker est installé depuis le dépôt officiel Docker.
      Uptime Kuma sera installé et configuré avec Ansible.

runcmd:
  - |
    apt-get remove -y docker.io docker-compose docker-compose-v2 docker-doc podman-docker containerd runc || true

  - |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc

  - |
    cat > /etc/apt/sources.list.d/docker.sources <<EOF
    Types: deb
    URIs: https://download.docker.com/linux/ubuntu
    Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
    Components: stable
    Architectures: $(dpkg --print-architecture)
    Signed-By: /etc/apt/keyrings/docker.asc
    EOF

  - apt-get update

  - |
    apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  - usermod -aG docker admincloud

  - echo "cloud-init terminé sur la VM monitoring le $(date)" > /var/log/tp-cloud-init-monitoring.log
  - touch /opt/cloud-init-monitoring-ok

final_message: "Cloud-init terminé sur la VM monitoring après $UPTIME secondes"
