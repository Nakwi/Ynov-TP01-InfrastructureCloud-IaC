#cloud-config

hostname: monitoring
fqdn: monitoring.local

timezone: Europe/Paris

package_update: true
package_upgrade: true

users:
  - name: admincloud
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_public_key}

ssh_pwauth: false

packages:
  - ca-certificates
  - curl
  - python3-apt

write_files:
  - path: /opt/cloud-init-monitoring-info.txt
    permissions: "0644"
    owner: root:root
    content: |
      VM monitoring initialisee par cloud-init.
      Docker installe depuis le depot officiel Docker.
      Uptime Kuma sera deploye et configure avec Ansible.

runcmd:
  - systemctl enable --now qemu-guest-agent
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker admincloud
  - echo "cloud-init termine sur la VM monitoring le $(date)" > /var/log/tp-cloud-init-monitoring.log
  - touch /opt/cloud-init-monitoring-ok

final_message: "Cloud-init termine sur la VM monitoring apres $UPTIME secondes"