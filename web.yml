#cloud-config

hostname: web
fqdn: web.local

package_update: true
package_upgrade: true

users:
  - name: admincloud
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_public_key}

packages:
  - curl
  - wget
  - git
  - htop
  - unzip
  - python3
  - python3-apt
  - python3-pip
  - nginx

write_files:
  - path: /opt/cloud-init-web-info.txt
    permissions: "0644"
    owner: root:root
    content: |
      VM web initialisée par cloud-init.
      Paquets installés : Python, outils de base, Nginx.
      La configuration de Nginx sera faite avec Ansible.

runcmd:
  - echo "cloud-init terminé sur la VM web le $(date)" > /var/log/tp-cloud-init-web.log
  - touch /opt/cloud-init-web-ok

final_message: "Cloud-init terminé sur la VM web après $UPTIME secondes"
