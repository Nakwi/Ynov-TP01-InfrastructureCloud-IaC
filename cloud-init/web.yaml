#cloud-config

hostname: web
fqdn: web.local

timezone: Europe/Paris

package_update: true
package_upgrade: true

users:
  - name: admincloud
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFAG3iBJV8oS0IipL3EfRGrysOU0Iyauc0LBmkZAlBmQ"

ssh_pwauth: false

packages:
  - python3-apt
  - nginx

write_files:
  - path: /opt/cloud-init-web-info.txt
    permissions: "0644"
    owner: root:root
    content: |
      VM web initialisee par cloud-init.
      Paquets installes : Python, outils de base, Nginx.
      La configuration de Nginx sera faite avec Ansible.

runcmd:
  - echo "cloud-init terminz sur la VM web le $(date)" > /var/log/tp-cloud-init-web.log
  - touch /opt/cloud-init-web-ok

final_message: "Cloud-init terminz sur la VM web apres $UPTIME secondes"